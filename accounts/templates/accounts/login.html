{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}
    Login
{% endblock title %}
{% block content %}
    <div class="container">
        <div class="row justify-content-center">
            <h2 class="pt-5 pb-3">Login</h2>
            <div class="col-12 col-md-8 col-lg-6">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }} <!--Render this form using crispy forms-->
                    <button type="submit" class="btn btn-primary">Login</button>
                    <p class="mt-3">
                        Don't have an account? <a href="{% url 'register' %}">Register here</a> <!--Use <a> tags which is semantic for links-->
                    </p>
                </form>
            </div>
        </div>
    </div>
{% endblock content %}
