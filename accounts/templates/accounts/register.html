{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}
  Register
{% endblock title %}
{% block content %}
  <h2>Register</h2>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col12 col-md-8 col-lg-6">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }} <!--Render this form using crispy forms-->
          <button type="submit" class="btn btn-primary">Create Account</button>
          <p class="mt-3">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
          </p>
        </form>
      </div>
    </div>
  </div>
{% endblock content %}
